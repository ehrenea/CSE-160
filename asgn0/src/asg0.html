<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Draw a blue rectangle (canvas version)</title>
    </head>

    <body onload="main()">
        <canvas id="example" width="400" height="400">
        Please use a browser that supports "canvas"
        </canvas><br>

        <label for="v1">v1:</label>
        <label for="xcord1">x</label>
        <input type="number" id="xcord1" name="xcord1">
        <label for="ycord1">y</label>
        <input type="number" id="ycord1" name="ycord1"><br><br>

        <label for="v2">v2:</label>
        <label for="xcord2">x</label>
        <input type="number" id="xcord2" name="xcord2">
        <label for="ycord2">y</label>
        <input type="number" id="ycord2" name="ycord2"><br><br>
        <input type="button" value="Draw" onclick="handleDrawEvent()"><br><br>

        <label for="operation">Operation:</label>
        <select name="operation" id="operation">
            <option value="add">Add</option>
            <option value="sub">Subtract</option>
            <option value="div">Divide</option>
            <option value="angle">Angle Between</option>
            <option value="area">Area</option>
            <option value="mul">Multiply</option>
            <option value="mag">Magnitude</option>
            <option value="norm">Normalize</option>
        </select>
        <label for="scalar">Scalar:</label>
        <input type="number" id="scalar" name="scalar"><br><br>
        <input type="button" value="Draw" onclick="handleDrawOperationEvent()"><br><br>

        <script src="lib/cuon-matrix-cse160.js"></script>
        <script src="asg0.js"></script>
    </body>
</html>
